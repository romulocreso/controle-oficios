<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Controle de Ofícios</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1>Controle de Ofícios</h1>
      <p id="loginSubtitle" class="login-subtitle">Faça login para acessar o sistema.</p>

      <hr class="login-divider" />

      <form id="loginForm">
        <label>
          <span>E-mail</span>
          <div class="input-icon">
            <span class="input-symbol">✉</span>
            <input
              type="email"
              id="loginEmail"
              placeholder="Digite seu e-mail"
              autocomplete="username"
            />
          </div>
        </label>

        <label>
          <span>Senha</span>
          <div class="input-icon">
            <span class="input-symbol">🔒</span>
            <input
              type="password"
              id="loginPassword"
              placeholder="Digite sua senha"
              autocomplete="current-password"
            />
          </div>
        </label>

        <label id="confirmPasswordField" class="hidden">
          <span>Confirmar Senha</span>
          <div class="input-icon">
            <span class="input-symbol">🔒</span>
            <input
              type="password"
              id="loginPasswordConfirm"
              placeholder="Repita sua senha"
              autocomplete="new-password"
            />
          </div>
        </label>

        <button type="submit" id="submitBtn" class="btn btn-primary login-submit">Entrar</button>
      </form>

      <p class="login-toggle">
        <span id="toggleText">Não tem conta?</span>
        <button type="button" id="toggleModeBtn" class="btn-link" onclick="toggleMode()">Cadastre-se</button>
      </p>

      <div id="toast" class="toast hidden"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="login.js?v=3"></script>
</body>
</html>
