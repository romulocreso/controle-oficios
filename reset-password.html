<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha - Controle de Ofícios</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1>Controle de Ofícios</h1>
      <p id="resetSubtitle" class="login-subtitle">Digite sua nova senha.</p>

      <hr class="login-divider" />

      <form id="resetForm">
        <label>
          <span>Nova Senha</span>
          <div class="input-icon">
            <span class="input-symbol">🔒</span>
            <input
              type="password"
              id="newPassword"
              placeholder="Digite a nova senha"
              autocomplete="new-password"
            />
          </div>
        </label>

        <label>
          <span>Confirmar Nova Senha</span>
          <div class="input-icon">
            <span class="input-symbol">🔒</span>
            <input
              type="password"
              id="newPasswordConfirm"
              placeholder="Repita a nova senha"
              autocomplete="new-password"
            />
          </div>
        </label>

        <button type="submit" id="submitBtn" class="btn btn-primary login-submit">Salvar nova senha</button>
      </form>

      <div id="toast" class="toast hidden"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="reset-password.js?v=1"></script>
</body>
</html>
